[workspace]
resolver = "3"
members = [
    "crates/engine",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.91"

[workspace.dependencies]
# Base dependencies shared by the engine and node system; versions unified here.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
