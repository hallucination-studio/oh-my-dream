[workspace]
resolver = "3"
members = [
    "crates/projects",
    "crates/engine",
    "crates/nodes",
    "crates/backends",
    "crates/assets",
    "crates/assistant",
    "src-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.91"

[workspace.dependencies]
# Base dependencies shared across crates; versions unified here.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
# Assistant operation schemas are generated from their canonical Rust DTOs.
schemars = "0.8.22"
# Model-controlled operation input is validated against generated Draft 7 schemas.
jsonschema = { version = "0.47", default-features = false }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
async-trait = "0.1"
# Async assistant transport and integration tests share one Tokio feature set.
tokio = { version = "1", features = ["macros", "rt", "io-util", "process", "time"] }
pollster = "0.4"
tauri = "2"
tauri-build = "2"
rusqlite = { version = "0.32", features = ["bundled"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
tempfile = "3"
getrandom = "0.2"
# Internal crates reference each other through the workspace.
engine = { path = "crates/engine" }
backends = { path = "crates/backends" }
assets = { path = "crates/assets" }
assistant = { path = "crates/assistant" }
nodes = { path = "crates/nodes" }
projects = { path = "crates/projects" }
